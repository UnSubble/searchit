name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted"
            gofmt -l .
            exit 1
          fi

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

  test-and-build:
    name: Test & Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.26.x"]

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Unit Tests
        run: go test -v ./...

      - name: Race Detection Tests
        # Only run race tests on Linux/macOS; race detector on Windows in Actions is sometimes slow or flaky
        if: matrix.os != 'windows-latest'
        run: go test -race ./...

      - name: Code Coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Compile Benchmarks (Verification)
        run: go test -run=^$ -bench=. ./...

      - name: Build local binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Build local binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          ./build.sh

      - name: Binary Smoke Tests (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          dist/searchit --version
          dist/searchit scan --help

      - name: Binary Smoke Tests (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dist\searchit.exe --version
          dist\searchit.exe scan --help

      - name: Upload Coverage Report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: code-coverage
          path: coverage.out
          retention-days: 7