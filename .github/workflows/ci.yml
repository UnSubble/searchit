name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version:
          - "1.26.4"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test -v ./...

      - name: Race Detection Tests
        run: go test -race ./...

      - name: Code Coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Fuzz Status Filters
        run: go test -fuzz=FuzzParseStatusFilters -fuzztime=5s ./internal/status

      - name: Fuzz Size Filters
        run: go test -fuzz=FuzzParseSizeFilters -fuzztime=5s ./internal/size

      - name: Fuzz CleanWord
        run: go test -fuzz=FuzzCleanWord -fuzztime=5s ./internal/wordlist

      - name: Build
        run: ./build.sh