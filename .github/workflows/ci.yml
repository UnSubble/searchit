name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
# ----------------------------------------------------
# Tier 1: FAST CI (Immediate developer feedback)
# ----------------------------------------------------

  fast-ci:
    name: Fast CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Pre-install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Lint
        run: |
          chmod +x scripts/ci/lint.sh
          ./scripts/ci/lint.sh

      - name: Build
        run: |
          go build ./...

      - name: Tests
        run: |
          go test ./...

      - name: Race Tests
        run: |
          go test -race ./...

      - name: Build Binaries
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Binary Smoke Tests
        run: |
          chmod +x scripts/ci/binary_smoke_test.sh
          ./scripts/ci/binary_smoke_test.sh

# ----------------------------------------------------
# Tier 2: FULL COMPATIBILITY MATRIX
# ----------------------------------------------------

  compatibility:
    name: Compatibility (${{ matrix.os }}, Go ${{ matrix.go-version }})
    needs: fast-ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu Matrix (minimum: Go 1.23 — required by golang.org/x/net@v0.38.0)
          - os: ubuntu-latest
            go-version: "1.23.x"
          - os: ubuntu-latest
            go-version: "1.24.x"
          - os: ubuntu-latest
            go-version: "1.25.x"
          - os: ubuntu-latest
            go-version: "1.26.x"

          # Windows Matrix
          - os: windows-latest
            go-version: "1.23.x"
          - os: windows-latest
            go-version: "1.26.x"

          # macOS Matrix
          - os: macos-latest
            go-version: "1.23.x"
          - os: macos-latest
            go-version: "1.26.x"

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Set Linker Flags for macOS dyld Compatibility
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          echo "GOFLAGS=-ldflags=-linkmode=external" >> $GITHUB_ENV

      - name: Build
        run: |
          go build ./...

      - name: Unit Tests
        run: |
          go test ./...

      # Additional verification runs restricted to Ubuntu + Latest Go (avoid duplication overhead)
      - name: Shuffle Tests
        if: matrix.go-version == '1.26.x' && matrix.os == 'ubuntu-latest'
        run: |
          go test -shuffle=on ./...

      - name: Race Tests
        if: matrix.go-version == '1.26.x' && matrix.os == 'ubuntu-latest'
        run: |
          go test -race ./...

      - name: Binary Build
        if: matrix.go-version == '1.26.x' && matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build.sh
          ./build.sh

# ----------------------------------------------------
# Tier 3: SCIENTIFIC TESTS
# ----------------------------------------------------

  determinism:
    name: Determinism Verification
    needs: fast-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Determinism Tests
        run: |
          chmod +x scripts/ci/determinism_test.sh
          ./scripts/ci/determinism_test.sh

  stress:
    name: Stress & Race Safety
    needs: fast-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Stress Tests
        run: |
          chmod +x scripts/ci/stress_test.sh
          ./scripts/ci/stress_test.sh

  pipeline:
    name: Pipeline Verification
    needs: fast-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Pipeline Tests
        run: |
          chmod +x scripts/ci/pipeline_test.sh
          ./scripts/ci/pipeline_test.sh

  compatibility-tests:
    name: Output & Profile Compatibility
    needs: fast-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Compatibility Tests
        run: |
          chmod +x scripts/ci/compatibility_test.sh
          ./scripts/ci/compatibility_test.sh
